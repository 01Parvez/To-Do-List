# ===================================================
# Library Management System - Application Configuration
# ===================================================

# Server port
server.port=8081

# ===================================================
# DATABASE CONFIGURATION (MySQL)
# ===================================================
# Change username/password to match your MySQL setup
spring.datasource.url=jdbc:mysql://localhost:3306/library_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=admin
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================================
# JPA / HIBERNATE CONFIGURATION
# ===================================================
# update: auto-updates schema on app start (use 'create-drop' for fresh start)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===================================================
# JWT CONFIGURATION
# ===================================================
# Secret key (change in production - must be at least 256-bit / 32 chars)
app.jwt.secret=LibraryManagementSystemSecretKey2024@SpringBoot@JWT@SecureKey
# Token expiry: 24 hours in milliseconds (24 * 60 * 60 * 1000)
app.jwt.expiration=86400000

# ===================================================
# FINE CALCULATION
# ===================================================
# Fine per day in rupees for overdue books
app.fine.per-day=10

# Default borrow duration in days
app.borrow.duration-days=14

# ===================================================
# FILE UPLOAD (for book cover images)
# ===================================================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.dir=uploads/

# ===================================================
# LOGGING
# ===================================================
logging.level.com.library=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ===================================================
# SWAGGER / SPRINGDOC
# ===================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
